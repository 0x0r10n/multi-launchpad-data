version: '3.8'

services:
  indexer:
    build: .
    restart: always
    container_name: sol-indexer
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - SOLANA_RPC=${SOLANA_RPC}
      - YELLOWSTONE_ENDPOINT=${YELLOWSTONE_ENDPOINT}
      - YELLOWSTONE_TOKEN=${YELLOWSTONE_TOKEN}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: always
    container_name: sol-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
